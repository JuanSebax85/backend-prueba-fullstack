version: '3.8'

services:

  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_DB: prueba
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: backend_app
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      DB_URI: jdbc:postgresql://db:5432/prueba
      DB_USER: postgres
      DB_PASSWORD: 1234
      DB_DRIVER: org.postgresql.Driver